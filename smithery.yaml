name: translation-ai-mcp
description: Translation Ai automation via MCP. Includes translate text, detect language,
  check grammar. By MEOK AI Labs.
version: 1.0.0
tools:
- name: translate_text
  description: Translate text between languages using built-in dictionary and word
    mapping.
  parameters:
  - name: text
    type: string
    required: true
  - name: source_language
    type: string
    required: false
  - name: target_language
    type: string
    required: false
- name: detect_language
  description: Detect the language of input text using script and word analysis.
  parameters:
  - name: text
    type: string
    required: true
  - name: detailed
    type: boolean
    required: false
- name: check_grammar
  description: Check text for common grammar and style issues.
  parameters:
  - name: text
    type: string
    required: true
  - name: language
    type: string
    required: false
- name: adjust_tone
  description: Analyze text tone and provide recommendations for adjustment.
  parameters:
  - name: text
    type: string
    required: true
  - name: target_tone
    type: string
    required: false
- name: validate_localization
  description: Validate localized strings for common internationalization issues.
  parameters:
  - name: strings
    type: array
    required: true
  - name: target_locale
    type: string
    required: false
startCommand:
  type: stdio
  configSchema:
    type: object
    required:
    - apiKey
    properties:
      apiKey:
        type: string
        description: Your MEOK API Key
  commandFunction: "(config) => ({\n  command: 'uvx',\n  args: ['translation-ai-mcp',\
    \ '--api-key', config.apiKey],\n  env: {\n    MEOK_API_KEY: config.apiKey\n  }\n\
    })"
